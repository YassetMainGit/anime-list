<!-- TOP BAR -->

<div class="topbar" style="height: 100px">

  <a class="logo" (click)="showAllProducts()">Anime List by Asset</a>
  <div style="width: 200px"></div>
  <button (click)="sortByRating()">★</button>

  <input [(ngModel)]="searchText" placeholder="Поиск по названию" (keyup.enter)="search()">
  <button (click)="search()">🔍</button>

  <div class="icons">
    <a class="circle">👤</a>
  </div>

</div>


<!-- CATEGORIES -->

<div class="categories">

  <button (click)="filterCategory('men')">Онгоинг</button>
  <button (click)="filterCategory('women')">Посмотрел</button>
  <button (click)="filterCategory('kids')">Не досмотрел</button>
  <button (click)="filterCategory('unisex')">Планирую посмотреть</button>

</div>


<div class="layout">

  <!-- PRODUCTS -->

  <div class="products">

    @if(filteredProducts.length === 0){
      <div class="not-found">
        Ничего не найдено
      </div>
    }

    @for(product of filteredProducts; track product.id){

      <div class="card" [ngClass]="product.category">

        <div class="rating">
          ★ {{product.rating}}
        </div>

        <a [href]="product.link" target="_blank">
          <img [src]="product.image">
        </a>

        <div class="bottom">

          <div class="name">{{product.name}}</div>

        </div>

      </div>

    }

  </div>

</div>
