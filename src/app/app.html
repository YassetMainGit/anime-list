<!-- TOP BAR -->

<div class="topbar">

  <a class="logo" (click)="showAllProducts()">DISHMANSKI-SHOP</a>
  <div style="width: 200px"></div>
  <button (click)="sortByLikes()">❤</button>
  <button (click)="sortByRating()">★</button>
  <button (click)="sortByPrice()">₸</button>

  <input [(ngModel)]="searchText" placeholder="Поиск по названию" (keyup.enter)="search()">
  <button (click)="search()">🔍</button>

  <div class="icons">
    <a class="circle">❤</a>
    <a class="circle">🛒</a>
    <a class="circle">👤</a>
  </div>

</div>


<!-- CATEGORIES -->

<div class="categories">

  <button (click)="filterCategory('men')">Мужская</button>
  <button (click)="filterCategory('women')">Женская</button>
  <button (click)="filterCategory('kids')">Мальчики</button>
  <button (click)="filterCategory('unisex')">Девочки</button>

</div>


<div class="layout">

  <!-- ADS -->
  <div class="m200">
    <img src="https://avatars.mds.yandex.net/i?id=5d28aef3515ac63e3ce50008ef4b2c14616784a7-5210205-images-thumbs&n=13" alt="">
  </div>
  <div class="ads">
    <img src="https://www.shutterstock.com/image-vector/vertical-web-banner-online-casino-600w-2731447915.jpg">
  </div>


  <!-- PRODUCTS -->

  <div class="products">

    @if(filteredProducts.length === 0){
      <div class="not-found">
        Ничего не найдено
      </div>
    }

    @for(product of filteredProducts; track product.id){

      <div class="card">

        <div class="rating">
          ★ {{product.rating}}
        </div>

        <a [href]="product.link" target="_blank">
          <img [src]="product.image">
        </a>

        <div class="bottom">

          <div class="name">{{product.name}}</div>

          <div class="price">{{product.price}}₸</div>

          <button class="like" (click)="like(product)">
            {{product.likes}} ❤
          </button>

        </div>

      </div>

    }

  </div>

</div>
